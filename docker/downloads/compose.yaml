services:
  gluetun-qbittorrent:
    image: qmcgaw/gluetun:latest
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    security_opt:
      - no-new-privileges:true
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${HL_PROTON_WG_PRIVATE_KEY}
      - SERVER_COUNTRIES=Netherlands
      - PORT_FORWARD_ONLY=on
      - VPN_PORT_FORWARDING=on
      # Common
      - TZ=${HL_TZ}
    volumes:
      - ${HL_CONFIG_FOLDER}/gluetun-qbittorrent:/gluetun
    ports:
      - 8080:8080
    restart: unless-stopped
    networks:
      - main

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    environment:
      - PUID=${HL_USER}
      - PGID=${HL_GROUP}
      - TZ=${HL_TZ}
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - ${HL_CONFIG_FOLDER}/qbittorrent:/config
      - ${HL_DATA_FOLDER}/downloads:/data/downloads
    restart: unless-stopped
    depends_on:
      - gluetun-qbittorrent
    network_mode: service:gluetun-qbittorrent

  metube:
    image: ghcr.io/alexta69/metube
    environment:
      - UID=${HL_USER}
      - GID=${HL_GROUP}
    volumes:
      - ${HL_DATA_FOLDER}/downloads:/downloads
    ports:
      - 8081:8081
    restart: unless-stopped
    networks:
      - main

networks:
  main:
    name: main
    external: true
