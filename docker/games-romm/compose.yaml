services:
  romm:
    image: rommapp/romm:latest
    environment:
      - PUID=${HL_USER}
      - PGID=${HL_GROUP}
      - TZ=${HL_TZ}
      - DB_HOST=romm-db
      - DB_NAME=romm
      - DB_USER=alejandro
      - DB_PASSWD=${HL_MARIADB_PASSWORD}
      - ROMM_AUTH_SECRET_KEY=${HL_ROMM_AUTH_SECRET_KEY}
      # - SCREENSCRAPER_USER= # These are the recommended metadata providers
      # - SCREENSCRAPER_PASSWORD= # https://docs.romm.app/latest/Getting-Started/Metadata-Providers/#screenscraper
      # - RETROACHIEVEMENTS_API_KEY= # https://docs.romm.app/latest/Getting-Started/Metadata-Providers/#retroachievements
      # - STEAMGRIDDB_API_KEY= # https://docs.romm.app/latest/Getting-Started/Metadata-Providers/#steamgriddb
      - HASHEOUS_API_ENABLED=true # https://docs.romm.app/latest/Getting-Started/Metadata-Providers/#hasheous
    volumes:
      - romm_resources:/romm/resources # Resources fetched from IGDB (covers, screenshots, etc.)
      - romm_redis_data:/redis-data # Cached data for background tasks
      - ${HL_CONFIG_FOLDER}/romm/library:/romm/library # Your game library. Check https://docs.romm.app/latest/Getting-Started/Folder-Structure/ for more details.
      - ${HL_CONFIG_FOLDER}/romm/assets:/romm/assets # Uploaded saves, states, etc.
      - ${HL_CONFIG_FOLDER}/romm/config:/romm/config # (Optional) Path where config.yml is stored
    ports:
      - 8084:8080
    restart: unless-stopped
    depends_on:
      romm-db:
        condition: service_healthy
        restart: true
    networks:
      - main

  romm-db:
    image: mariadb:latest
    environment:
      - TZ=${HL_TZ}
      - MARIADB_ROOT_PASSWORD=${HL_MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=romm
      - MARIADB_USER=alejandro
      - MARIADB_PASSWORD=${HL_MARIADB_PASSWORD}
    volumes:
      - romm_mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      start_period: 30s
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - main

volumes:
  romm_resources:
  romm_mysql_data:
  romm_redis_data:

networks:
  main:
    name: main
    external: true
